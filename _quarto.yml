project:
  type: book
  output-dir: _book

lang: pt

book:
  title: "Manual de Economia"
  subtitle: "Um manual aberto e abrangente — série Manuais de Ciências"
  author: "Série Manuais de Ciências"
  date: today
  date-format: "YYYY"
  language: pt
  search: true
  repo-url: https://github.com/VitorMattosDev/manual-economia
  repo-actions: [edit, issue]
  sidebar:
    style: docked
    collapse-level: 1
  page-footer:
    left: "Manual de Economia — conteúdo aberto (CC BY-SA)."
    right: "Feito com [Quarto](https://quarto.org)."
  chapters:
    - index.qmd
    - part: "Volume 1 — Introdução à Economia"
      chapters:
        - capitulos/vol01/cap01-o-que-e-economia.qmd
        - capitulos/vol01/cap02-metodo-da-economia.qmd
        - capitulos/vol01/cap03-sistemas-economicos.qmd
        - capitulos/vol01/cap04-vantagem-comparativa.qmd
        - capitulos/vol01/cap05-fluxo-circular.qmd
        - capitulos/vol01/cap06-micro-e-macro.qmd
    - part: "Volume 2 — Matemática para Economistas"
      chapters:
        - capitulos/vol02/cap01-funcoes-e-graficos.qmd
        - capitulos/vol02/cap02-equacoes-e-equilibrio.qmd
        - capitulos/vol02/cap03-limites-e-continuidade.qmd
        - capitulos/vol02/cap04-derivadas-analise-marginal.qmd
        - capitulos/vol02/cap05-otimizacao-livre.qmd
        - capitulos/vol02/cap06-lagrange.qmd
        - capitulos/vol02/cap07-integrais-excedentes.qmd
        - capitulos/vol02/cap08-matrizes.qmd
    - part: "Volume 3 — Microeconomia I: Mercados e Consumidor"
      chapters:
        - capitulos/vol03/cap01-demanda.qmd
        - capitulos/vol03/cap02-oferta.qmd
        - capitulos/vol03/cap03-equilibrio-de-mercado.qmd
        - capitulos/vol03/cap04-elasticidades.qmd
        - capitulos/vol03/cap05-aplicacoes-intervencoes.qmd
        - capitulos/vol03/cap06-preferencias-utilidade.qmd
        - capitulos/vol03/cap07-escolha-do-consumidor.qmd
        - capitulos/vol03/cap08-efeitos-renda-substituicao.qmd
    - part: "Volume 4 — Macroeconomia I: Medindo a Economia"
      chapters:
        - capitulos/vol04/cap01-contas-nacionais-pib.qmd
        - capitulos/vol04/cap02-pib-real-deflatores.qmd
        - capitulos/vol04/cap03-inflacao.qmd
        - capitulos/vol04/cap04-desemprego.qmd
        - capitulos/vol04/cap05-crescimento-fatos.qmd
        - capitulos/vol04/cap06-poupanca-investimento.qmd
        - capitulos/vol04/cap07-indicadores-na-pratica.qmd
    - part: "Volume 5 — Microeconomia II: Firmas e Estruturas de Mercado"
      chapters:
        - capitulos/vol05/cap01-teoria-da-producao.qmd
        - capitulos/vol05/cap02-custos.qmd
        - capitulos/vol05/cap03-concorrencia-perfeita.qmd
        - capitulos/vol05/cap04-monopolio.qmd
        - capitulos/vol05/cap05-concorrencia-monopolistica.qmd
        - capitulos/vol05/cap06-oligopolio.qmd
        - capitulos/vol05/cap07-regulacao-cade.qmd
    - part: "Volume 6 — Microeconomia III: Jogos, Falhas de Mercado e Incerteza"
      chapters:
        - capitulos/vol06/cap01-teoria-dos-jogos.qmd
        - capitulos/vol06/cap02-jogos-repetidos.qmd
        - capitulos/vol06/cap03-externalidades.qmd
        - capitulos/vol06/cap04-bens-publicos.qmd
        - capitulos/vol06/cap05-informacao-assimetrica.qmd
        - capitulos/vol06/cap06-economia-do-trabalho.qmd
        - capitulos/vol06/cap07-escolha-sob-incerteza.qmd
    - part: "Volume 7 — Macroeconomia II: Modelos e Política Econômica"
      chapters:
        - capitulos/vol07/cap01-demanda-agregada.qmd
        - capitulos/vol07/cap02-is-lm.qmd
        - capitulos/vol07/cap03-politicas-no-is-lm.qmd
        - capitulos/vol07/cap04-oferta-agregada-phillips.qmd
        - capitulos/vol07/cap05-ad-as-choques.qmd
        - capitulos/vol07/cap06-expectativas.qmd
        - capitulos/vol07/cap07-ciclos.qmd
        - capitulos/vol07/cap08-debates-macroeconomicos.qmd

bibliography: referencias.bib
csl: referencias-abnt.csl

filters:
  - danmackinlay/tikz
  - quarto

tikz:
  svg-engine: dvisvgm
  cache: true

format:
  html:
    theme: [cosmo, styles.css]
    toc: true
    toc-depth: 3
    toc-title: "Nesta página"
    number-sections: true
    fig-align: center
    code-copy: true
    smooth-scroll: true
    html-math-method: mathjax
  pdf:
    documentclass: scrbook
    papersize: a4
    number-sections: true
    toc: true
    toc-depth: 2
    colorlinks: true
    keep-tex: false
    include-in-header:
      text: |
        \usepackage{amsmath,amssymb}
