name: Publicar Manual de Economia

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Instalar chrome-headless-shell (mermaid no PDF)
        run: quarto install chrome-headless-shell

      - name: Preparar TeX (PATH do TinyTeX + pacotes TikZ)
        run: |
          set -e
          # A extensão TikZ chama pdflatex/dvisvgm pelo nome, então o bin do
          # TinyTeX PRECISA estar no PATH (o setup não o adiciona sozinho).
          PDFLATEX=$(find ~ /opt /usr -name pdflatex -type f 2>/dev/null | head -n1)
          TEXBIN=$(dirname "$PDFLATEX")
          echo "TeX bin encontrado em: $TEXBIN"
          echo "$TEXBIN" >> "$GITHUB_PATH"
          TLMGR="$TEXBIN/tlmgr"
          [ -x "$TLMGR" ] || TLMGR=$(find ~ /opt /usr -name tlmgr -type f 2>/dev/null | head -n1)
          echo "tlmgr em: $TLMGR"
          "$TLMGR" install standalone pgf pgfplots dvisvgm xcolor amsmath amsfonts || true
          "$TEXBIN/pdflatex" --version | head -n1
          "$TEXBIN/dvisvgm" --version | head -n1

      - name: Renderizar e publicar (HTML + PDF)
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
